; ============================================================
; php.ini — Railway deployment config for OT Tracking System
; ============================================================

; Suppress deprecation warnings from CodeIgniter 3 on PHP 8.2
; (dynamic property creation is deprecated in 8.2, removed in 9.0)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
log_errors = On

; Required extensions
extension=mysqli
extension=curl
extension=openssl
extension=mbstring

; Timezone
date.timezone = Asia/Manila

; Upload limits
upload_max_filesize = 10M
post_max_size = 10M
max_execution_time = 60
