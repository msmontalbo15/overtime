; ============================================================
; php.ini — Railway deployment config for OT Tracking System
; ============================================================

; Suppress deprecation + warnings from CodeIgniter 3 on PHP 8.1
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_WARNING
display_errors = Off
log_errors = On

; Session — /tmp is always writable in Docker containers
session.save_handler = files
session.save_path = /tmp
session.gc_probability = 1
session.gc_divisor = 100

; Timezone
date.timezone = Asia/Manila

; Upload limits
upload_max_filesize = 10M
post_max_size = 10M
max_execution_time = 60

; NOTE: Do NOT load extensions here — mysqli, curl, mbstring
; are already compiled in. Adding them causes "already loaded" warnings.
